{% extends "layout.html" %}

{% block title %}
Tweet Form
{% endblock %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-2xl bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">
                {% if form.instance.pk %}
                    ✏️ Edit Tweet
                {% else %}
                    ✨ Create Your Moment
                {% endif %}
            </h1>

            <p class="text-gray-400 mt-3">
                Share your thoughts with the world.
            </p>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-6">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="flex justify-between pt-4">

                <a href="{% url 'tweet_list' %}"
                   class="px-6 py-3 rounded-xl border border-gray-500 text-gray-300 hover:bg-gray-700 transition">
                    Cancel
                </a>

                <button type="submit"
                        class="px-8 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-pink-500 font-semibold shadow-lg hover:shadow-cyan-500/40 transition duration-300">
                    {% if form.instance.pk %}
                        Update Tweet
                    {% else %}
                        Post Tweet
                    {% endif %}
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
