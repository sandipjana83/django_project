{% extends "layout.html" %}

{% block title %}
Chai Details
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">

        <img src="{{ chai.image.url }}"
             alt="{{ chai.name }}"
             class="w-full h-72 object-cover">

        <div class="p-6">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">
                {{ chai.name }}
            </h2>

            <span class="inline-block bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-sm font-medium mb-4">
                {{ chai.get_type_display }}
            </span>

            <p class="text-2xl font-bold text-green-600 mb-4">
                ₹{{ chai.price }}
            </p>

            <p class="text-gray-600 leading-relaxed">
                {{ chai.description }}
            </p>

            <a href="{% url 'all_home' %}"
               class="mt-6 inline-block bg-orange-500 text-white px-5 py-2 rounded-lg hover:bg-orange-600 transition">
                ← Back to All Chai
            </a>
        </div>

    </div>
</div>

{% endblock %}
