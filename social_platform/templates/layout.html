{% load static tailwind_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        SocialHub
        {% endblock %}
    </title>

    
    {% tailwind_css %}
</head>
<script>
function confirmLogout() {
    if (confirm("Are you sure you want to logout?")) {
        document.getElementById("logoutForm").submit();
    }
}
</script>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-black text-white">

<nav class="sticky top-0 z-50 bg-black/30 backdrop-blur-xl border-b border-white/10 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-20">

            <a href="{% url 'tweet_list' %}"
               class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">
                SocialHub
            </a>

            <div class="flex items-center gap-4">

                <a href="{% url 'tweet_list' %}"
                   class="px-4 py-2 hover:text-cyan-400">
                    🏠 Home
                </a>

                {% if user.is_authenticated %}
                <a href="{% url 'profile' %}"
                   class="px-4 py-2 hover:text-purple-400">
                    👤 Profile
                </a>

              <form id="logoutForm" method="post" action="{% url 'logged_out' %}">
    {% csrf_token %}

    <button
        type="button"
        onclick="confirmLogout()"
        class="px-5 py-2 rounded-xl bg-red-600 hover:bg-red-500">
        Logout
    </button>
</form>

                {% else %}

                <a href="{% url 'login' %}"
                   class="px-5 py-2 border border-cyan-500 rounded-xl">
                    Sign In
                </a>

                <a href="{% url 'register' %}"
                   class="px-5 py-2 rounded-xl bg-gradient-to-r from-purple-600 to-pink-600">
                    Sign Up
                </a>

                {% endif %}

            </div>
        </div>
    </div>
</nav>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
