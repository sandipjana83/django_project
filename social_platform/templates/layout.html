{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        default
        {% endblock %}
    </title>

    {% tailwind_css %}
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-black text-white">

    <!-- Navbar -->
   <nav class="sticky top-0 z-50 bg-black/30 backdrop-blur-xl border-b border-white/10 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between h-20">

        <!-- Logo -->
        <a href="/" class="text-3xl font-extrabold bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-clip-text text-transparent hover:scale-105 transition duration-300">
            SocialHub
        </a>

        <!-- Navigation -->
        <div class="flex items-center gap-4">

            <a href="{% url 'tweet_list' %}"
               class="px-4 py-2 text-gray-200 font-medium rounded-xl hover:bg-white/10 hover:text-cyan-400 transition duration-300">
                🏠 Home
            </a>

            <a href="{% url 'profile' %}"
               class="px-4 py-2 text-gray-200 font-medium rounded-xl hover:bg-white/10 hover:text-purple-400 transition duration-300">
                👤 Profile
            </a>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logged_out' %}">
    {% csrf_token %}
    <button
        type="submit"
        class="px-5 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-white font-semibold transition duration-300">
        Logout
    </button>
</form>

        {% else %}
            <a href="{% url 'login' %}"
               class="px-5 py-2 border border-cyan-500 text-cyan-400 rounded-xl hover:bg-cyan-500 hover:text-black font-semibold transition duration-300">
                Sign In
            </a>
        {% endif %}

        </div>
    </div>
</div>

</nav>


    <!-- Main Content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
